name: 🤖 Auto-Update Tribuna 10 Datos

on:
  schedule:
    # Cada 6h: 3am, 9am, 3pm, 9pm UTC
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:
    inputs:
      send_report:
        description: 'Enviar reporte de cambios'
        required: false
        default: false
        type: boolean

jobs:
  scrape-and-update:
    name: 🕵️ Scrape BBC Sport y actualizar
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 🏃 Run scraper
        id: scrape
        run: |
          python scripts/scrape_worldcup.py 2>&1 | tee scrape_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: 📊 Check for changes
        id: changes
        run: |
          git config user.name "Tribuna 10 Bot"
          git config user.email "bot@tribuna10.com"

          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📡 No hay cambios en los datos."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔍 Cambios detectados:"
            git diff --stat data.json
          fi

      - name: 💾 Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git add data.json
          git commit -m "🤖 Auto-update: datos ${TIMESTAMP}"
          git push

      - name: 📋 Summary
        run: |
          echo "## ✅ Resultado del Scrape" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detalle | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "| Datos actualizados | ✅ Sí |" >> $GITHUB_STEP_SUMMARY
            echo "| Commit | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Datos actualizados | ❌ Sin cambios |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat scrape_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> $GITHUB_STEP_SUMMARY
